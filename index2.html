<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Animales Marinos 🐠</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #89f7fe, #66a6ff);
}

/* Título */
h1 {
    text-align: center;
    color: white;
    padding: 30px;
}

/* Contenedor */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

/* Tarjetas */
.card {
    background: white;
    border-radius: 15px;
    width: 250px;
    padding: 15px;
    box-shadow: 0 10px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    color: white;
}
</style>

</head>

<body>

<h1>🌊 Animales Marinos 🐠</h1>

<div class="container">

<div class="card">
    <h2>🐢 Tortuga</h2>
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/f9/Green_turtle.jpg">
    <p>Viajan miles de kilómetros.</p>
</div>

<div class="card">
    <h2>🐋 Ballena</h2>
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Humpback_Whale_underwater_shot.jpg">
    <p>Son enormes.</p>
</div>

<div class="card">
    <h2>🐙 Pulpo</h2>
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Octopus2.jpg">
    <p>Muy inteligentes.</p>
</div>

</div>

<footer>
   <p>🌟 Página creada por: <strong>Laila Arevalo</strong></p>
</footer>

</body>
</html>
